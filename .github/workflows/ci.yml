name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Lint-only CI. Build & test are intentionally NOT run here: the project is
# developed in Xcode 27 (project format 110), which GitHub-hosted runners
# (Xcode 26.6) cannot open. Run the unit + UI test suites locally with Xcode ⌘U
# until GitHub runners ship Xcode 27, then restore the build/test job (see git
# history for commit 80489c3).
jobs:
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint & SwiftFormat
        run: brew install swiftlint swiftformat

      - name: SwiftLint (strict)
        run: swiftlint lint --strict --quiet

      - name: SwiftFormat (lint)
        run: swiftformat --lint .
