# SwiftLint configuration for Rainplay iOS.
# Fast local feedback in Xcode; complements (does not replace) SonarCloud.
# Autofix what it can:  swiftlint --fix
# CI runs `swiftlint lint --strict`, so every warning must be resolved.

included:
  - "Rainplay iOS"
  - "Rainplay iOSTests"
  - "Rainplay iOSUITests"

excluded:
  - "Rainplay iOS/Assets.xcassets"
  - "**/.build"
  - "DerivedData"

opt_in_rules:
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - explicit_init
  - first_where
  - redundant_nil_coalescing
  - toggle_bool
  - vertical_whitespace_closing_braces

line_length:
  warning: 180        # test files carry long data-setup lines
  error: 250
  ignores_comments: true
  ignores_urls: true

# The codebase uses short, conventional locals (r, g, b, a, i, d); don't flag them.
identifier_name:
  min_length:
    warning: 1
    error: 1

type_name:
  max_length:
    warning: 50
    error: 60

# Aligned with the SonarCloud thresholds; SwiftUI view bodies and the mapping /
# fetch code are legitimately larger than SwiftLint's defaults.
function_body_length:
  warning: 80
  error: 150

function_parameter_count:
  warning: 8
  error: 10

cyclomatic_complexity:
  warning: 15
  error: 25

# Allow one extra level so CodingKeys can live inside nested DTO structs
# (e.g. OpenMeteoResponse.Hourly.CodingKeys).
nesting:
  type_level:
    warning: 2

disabled_rules:
  - todo
  - trailing_comma
  # Would strip `= nil` from optional properties that rely on it for the
  # synthesized memberwise initializer's default (e.g. HourlyWeather.sunsetMs).
  - implicit_optional_initialization
